<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>RAKARA - Stok Bahan Ajar</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app" class="container">

    <h1>📚 Stok Bahan Ajar</h1>

    <!-- FILTER -->

    <div class="filter-box">

        <select v-model="selectedUPBJJ">
            <option value="">Semua UPBJJ</option>

            <option
                v-for="u in upbjjList"
                :value="u">

                {{ u }}
            </option>
        </select>

        <select
            v-model="selectedKategori"
            v-if="selectedUPBJJ">

            <option value="">Semua Kategori</option>

            <option
                v-for="k in kategoriList"
                :value="k">

                {{ k }}
            </option>
        </select>

        <label>
            <input type="checkbox" v-model="onlyWarning">
            Tampilkan Warning
        </label>

        <select v-model="sortBy">
            <option value="">Sort</option>
            <option value="judul">Judul</option>
            <option value="qty">Stok</option>
            <option value="harga">Harga</option>
        </select>

        <button @click="resetFilter">
            Reset
        </button>

    </div>

    <!-- TABLE -->

    <table>

        <thead>
            <tr>
                <th>Kode</th>
                <th>Judul</th>
                <th>Kategori</th>
                <th>UPBJJ</th>
                <th>Rak</th>
                <th>Harga</th>
                <th>Qty</th>
                <th>Safety</th>
                <th>Status</th>
                <th>Catatan</th>
            </tr>
        </thead>

        <tbody>

            <tr
                v-for="(item,index) in filteredStok"
                :key="index">

                <td>{{ item.kode }}</td>

                <td v-text="item.judul"></td>

                <td>{{ item.kategori }}</td>

                <td>{{ item.upbjj }}</td>

                <td>{{ item.lokasiRak }}</td>

                <td>
                    Rp {{ item.harga.toLocaleString() }}
                </td>

                <td>
                    <input
                        type="number"
                        v-model="item.qty">
                </td>

                <td>{{ item.safety }}</td>

                <td>

                    <span
                        v-if="item.qty == 0"
                        class="danger">

                        ❌ Kosong
                    </span>

                    <span
                        v-else-if="item.qty < item.safety"
                        class="warning">

                        ⚠ Menipis
                    </span>

                    <span
                        v-else
                        class="safe">

                        ✅ Aman
                    </span>

                </td>

                <td v-html="item.catatanHTML"></td>

            </tr>

        </tbody>

    </table>

    <!-- FORM -->

    <div class="form-box">

        <h2>➕ Tambah Bahan Ajar</h2>

        <input
            type="text"
            placeholder="Kode"
            v-model="form.kode">

        <input
            type="text"
            placeholder="Judul"
            v-model="form.judul">

        <select v-model="form.kategori">
            <option value="">Pilih Kategori</option>

            <option
                v-for="k in kategoriList"
                :value="k">

                {{ k }}
            </option>
        </select>

        <select v-model="form.upbjj">

            <option value="">Pilih UPBJJ</option>

            <option
                v-for="u in upbjjList"
                :value="u">

                {{ u }}
            </option>

        </select>

        <input
            type="number"
            placeholder="Harga"
            v-model="form.harga">

        <input
            type="number"
            placeholder="Qty"
            v-model="form.qty">

        <input
            type="number"
            placeholder="Safety"
            v-model="form.safety">

        <button @click="addData">
            Simpan
        </button>

    </div>

</div>

<script src="js/dataBahanAjar.js"></script>
<script src="js/stok-app.js"></script>

</body>
</html>
