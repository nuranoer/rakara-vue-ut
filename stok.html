<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <title>RAKARA - Stok Bahan Ajar</title>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- APP DUMMY DOSEN -->

    <div id="app" style="display:none;"></div>

    <!-- APP UTAMA -->

    <div id="mainApp" class="container">

        <h1>📚 Stok Bahan Ajar</h1>

        <!-- FILTER -->

        <div class="filter-box">

            <select v-model="selectedUPBJJ">

                <option value="">
                    Semua UPBJJ
                </option>

                <option
                    v-for="u in upbjjList"
                    :key="u"
                    :value="u">

                    {{ u }}

                </option>

            </select>

            <select
                v-if="selectedUPBJJ"
                v-model="selectedKategori">

                <option value="">
                    Semua Kategori
                </option>

                <option
                    v-for="k in kategoriList"
                    :key="k"
                    :value="k">

                    {{ k }}

                </option>

            </select>

            <label>

                <input
                    type="checkbox"
                    v-model="onlyWarning">

                Warning Only

            </label>

            <select v-model="sortBy">

                <option value="">
                    Sort Data
                </option>

                <option value="judul">
                    Judul
                </option>

                <option value="qty">
                    Qty
                </option>

                <option value="harga">
                    Harga
                </option>

            </select>

            <button @click="resetFilter">

                Reset

            </button>

        </div>

        <!-- TABLE -->

        <table>

            <thead>

                <tr>

                    <th>Kode</th>
                    <th>Judul</th>
                    <th>Kategori</th>
                    <th>UPBJJ</th>
                    <th>Rak</th>
                    <th>Harga</th>
                    <th>Qty</th>
                    <th>Safety</th>
                    <th>Status</th>
                    <th>Catatan</th>

                </tr>

            </thead>

            <tbody>

                <tr
                    v-for="(item,index) in filteredStok"
                    :key="index">

                    <td>{{ item.kode }}</td>

                    <td v-text="item.judul"></td>

                    <td>{{ item.kategori }}</td>

                    <td>{{ item.upbjj }}</td>

                    <td>{{ item.lokasiRak }}</td>

                    <td>

                        Rp {{ item.harga.toLocaleString() }}

                    </td>

                    <td>

                        <input
                            type="number"
                            v-model="item.qty">

                    </td>

                    <td>{{ item.safety }}</td>

                    <td>

                        <span
                            v-if="item.qty == 0"
                            class="danger">

                            ❌ Kosong

                        </span>

                        <span
                            v-else-if="item.qty < item.safety"
                            class="warning">

                            ⚠ Menipis

                        </span>

                        <span
                            v-else
                            class="safe">

                            ✅ Aman

                        </span>

                    </td>

                    <td v-html="item.catatanHTML"></td>

                </tr>

            </tbody>

        </table>

        <!-- FORM -->

        <div class="form-box">

            <h2>➕ Tambah Bahan Ajar</h2>

            <input
                type="text"
                placeholder="Kode"
                v-model="form.kode">

            <input
                type="text"
                placeholder="Judul"
                v-model="form.judul">

            <select v-model="form.kategori">

                <option value="">
                    Pilih Kategori
                </option>

                <option
                    v-for="k in kategoriList"
                    :key="k"
                    :value="k">

                    {{ k }}

                </option>

            </select>

            <select v-model="form.upbjj">

                <option value="">
                    Pilih UPBJJ
                </option>

                <option
                    v-for="u in upbjjList"
                    :key="u"
                    :value="u">

                    {{ u }}

                </option>

            </select>

            <input
                type="number"
                placeholder="Harga"
                v-model="form.harga">

            <input
                type="number"
                placeholder="Qty"
                v-model="form.qty">

            <input
                type="number"
                placeholder="Safety"
                v-model="form.safety">

            <button @click="addData">

                Simpan Data

            </button>

        </div>

    </div>

    <!-- DATA DOSEN -->

    <script src="js/dataBahanAjar.js"></script>

    <!-- VUE APP -->

    <script>

        new Vue({

            el:'#mainApp',

            data: {

                stok: app.$data.stok,

                upbjjList:
                    app.$data.upbjjList,

                kategoriList:
                    app.$data.kategoriList,

                selectedUPBJJ:'',

                selectedKategori:'',

                onlyWarning:false,

                sortBy:'',

                form: {

                    kode:'',
                    judul:'',
                    kategori:'',
                    upbjj:'',
                    harga:'',
                    qty:'',
                    safety:''

                }

            },

            computed: {

                filteredStok(){

                    let data = [...this.stok]

                    if(this.selectedUPBJJ){

                        data = data.filter(
                            item =>
                            item.upbjj ==
                            this.selectedUPBJJ
                        )

                    }

                    if(this.selectedKategori){

                        data = data.filter(
                            item =>
                            item.kategori ==
                            this.selectedKategori
                        )

                    }

                    if(this.onlyWarning){

                        data = data.filter(
                            item =>
                            item.qty <
                            item.safety
                        )

                    }

                    if(this.sortBy == 'judul'){

                        data.sort((a,b)=>
                            a.judul.localeCompare(
                                b.judul
                            )
                        )

                    }

                    if(this.sortBy == 'qty'){

                        data.sort((a,b)=>
                            a.qty - b.qty
                        )

                    }

                    if(this.sortBy == 'harga'){

                        data.sort((a,b)=>
                            a.harga - b.harga
                        )

                    }

                    return data

                }

            },

            methods: {

                resetFilter(){

                    this.selectedUPBJJ = ''

                    this.selectedKategori = ''

                    this.onlyWarning = false

                    this.sortBy = ''

                },

                addData(){

                    if(

                        !this.form.kode ||
                        !this.form.judul ||
                        !this.form.kategori ||
                        !this.form.upbjj ||
                        !this.form.harga ||
                        !this.form.qty ||
                        !this.form.safety

                    ){

                        alert(
                            "Semua field wajib diisi"
                        )

                        return

                    }

                    this.stok.push({

                        kode:this.form.kode,

                        judul:this.form.judul,

                        kategori:this.form.kategori,

                        upbjj:this.form.upbjj,

                        lokasiRak:"RAK-BARU",

                        harga:
                            Number(this.form.harga),

                        qty:
                            Number(this.form.qty),

                        safety:
                            Number(this.form.safety),

                        catatanHTML:
                            "<i>Data Baru</i>"

                    })

                    alert(
                        "Data berhasil ditambahkan"
                    )

                    this.form = {

                        kode:'',
                        judul:'',
                        kategori:'',
                        upbjj:'',
                        harga:'',
                        qty:'',
                        safety:''

                    }

                }

            },

            watch: {

                selectedUPBJJ(value){

                    console.log(
                        "UPBJJ berubah:",
                        value
                    )

                },

                onlyWarning(value){

                    console.log(
                        "Warning filter:",
                        value
                    )

                }

            }

        })

    </script>

</body>

</html>
